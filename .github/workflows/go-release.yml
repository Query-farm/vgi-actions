#
# Reusable workflow: build a Go VGI worker for every supported platform and
# attach the archives (+ SHA256 + keyless cosign signature + SLSA provenance) to
# the GitHub Release for a vX.Y.Z tag. The Go analogue of rust-release.yml.
#
# Go VGI workers link DuckDB through the vgi-go SDK (vgi-go -> duckdb-go/v2 ->
# duckdb-go-bindings), so they REQUIRE CGO. duckdb-go-bindings ships a prebuilt
# static lib per platform, so each target builds on its NATIVE runner with
# CGO_ENABLED=1 (pure-Go cross-compilation does not work — the binding files are
# build-constraint-excluded without cgo). This mirrors rust-release.yml's matrix:
# ubuntu (amd64 + arm64), macos-15 (osx_arm64 native, osx_amd64 cross-built with
# clang -arch x86_64), windows. Assets are named
# <asset_prefix>-<tag>-<duckdb_platform>.tar.gz (.tar.gz on every platform,
# Windows included — the binary is <bin>.exe inside). Each archive is cosign
# sign-blob'd into a .cosign.bundle and SLSA build-provenance attested.
#
# Signing runs HERE, so the keyless identity is this workflow
# (Query-farm/vgi-actions/.github/workflows/go-release.yml). workflow_call-only;
# the CALLER gates on its own test suite. See README.md.
name: go-release (reusable)

on:
  workflow_call:
    inputs:
      bin:
        description: Output binary name (the executable inside each archive). Defaults to the repo name.
        type: string
        default: ""
      package:
        description: Go package to build (the `go build` target).
        type: string
        default: "."
      asset_prefix:
        description: Archive base-name prefix. Defaults to the repository name.
        type: string
        default: ""
      version_check_cmd:
        description: >-
          Command run on a version-tag push with the tag appended as $1, to
          assert the tag matches the worker version. Empty = skip.
        type: string
        default: ""
      ldflags:
        description: >-
          Extra `-ldflags` for the build (e.g. "-s -w -X main.version=${TAG}").
          The string ${TAG} is replaced with the release tag.
        type: string
        default: "-s -w"
      go_version:
        description: Go version for actions/setup-go.
        type: string
        default: "stable"
      include:
        description: Comma-separated extra files to include in each archive.
        type: string
        default: "README.md,LICENSE"
      cgo:
        description: >-
          CGO_ENABLED value. Defaults to 1 — VGI Go workers embed DuckDB and need
          cgo. Set to 0 only for a genuinely pure-Go worker.
        type: string
        default: "1"

permissions:
  contents: read

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches worker version
        if: inputs.version_check_cmd != ''
        run: ${{ inputs.version_check_cmd }} "${GITHUB_REF_NAME}"
      - name: Create the GitHub Release if it doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
          else
            gh release create "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" \
              --title "${GITHUB_REF_NAME}" --generate-notes
          fi

  upload:
    name: ${{ matrix.platform }}
    needs: [create-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      ASSET_PREFIX: ${{ inputs.asset_prefix || github.event.repository.name }}
      BIN: ${{ inputs.bin || github.event.repository.name }}
      CGO_ENABLED: ${{ inputs.cgo }}
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        # Native runner per platform with cgo. osx_amd64 is the one cross-build:
        # macos-15 is Apple Silicon (macos-13, the last Intel image, is
        # deprecated), so clang targets x86_64 via `-arch x86_64` and links the
        # darwin-amd64 prebuilt lib.
        include:
          - { os: ubuntu-latest,    goos: linux,   goarch: amd64, platform: linux_amd64 }
          - { os: ubuntu-24.04-arm, goos: linux,   goarch: arm64, platform: linux_arm64 }
          - { os: macos-15,         goos: darwin,  goarch: amd64, platform: osx_amd64, cc: "clang -arch x86_64", cxx: "clang++ -arch x86_64" }
          - { os: macos-15,         goos: darwin,  goarch: arm64, platform: osx_arm64 }
          - { os: windows-latest,   goos: windows, goarch: amd64, platform: windows_amd64, ext: ".exe" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Build, archive, checksum
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          EXT="${{ matrix.ext }}"
          OUT="${BIN}${EXT}"
          LDFLAGS="${{ inputs.ldflags }}"
          LDFLAGS="${LDFLAGS//\$\{TAG\}/$TAG}"
          # Cross C compiler for the osx_amd64 leg only (empty otherwise).
          if [ -n "${{ matrix.cc }}" ]; then export CC="${{ matrix.cc }}" CXX="${{ matrix.cxx }}"; fi

          echo "::group::build ${GOOS}/${GOARCH} (CGO_ENABLED=${CGO_ENABLED}${CC:+, CC=$CC})"
          go build -trimpath -ldflags "$LDFLAGS" -o "$OUT" "${{ inputs.package }}"
          echo "::endgroup::"

          FILES=("$OUT")
          IFS=',' read -ra INC <<< "${{ inputs.include }}"
          for f in "${INC[@]}"; do f="${f// /}"; [ -n "$f" ] && [ -f "$f" ] && FILES+=("$f"); done

          ARCHIVE="${ASSET_PREFIX}-${TAG}-${{ matrix.platform }}.tar.gz"
          SUM="${ASSET_PREFIX}-${TAG}-${{ matrix.platform }}.sha256"
          tar czf "$ARCHIVE" "${FILES[@]}"
          sha256sum "$ARCHIVE" > "$SUM"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign + upload archive, checksum, bundle
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="${ASSET_PREFIX}-${TAG}-${{ matrix.platform }}.tar.gz"
          SUM="${ASSET_PREFIX}-${TAG}-${{ matrix.platform }}.sha256"
          cosign sign-blob --yes --bundle "${ARCHIVE}.cosign.bundle" "$ARCHIVE"
          gh release upload "$TAG" "$ARCHIVE" "$SUM" "${ARCHIVE}.cosign.bundle" --clobber

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ASSET_PREFIX }}-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz
